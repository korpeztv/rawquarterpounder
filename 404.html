<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <title>Table Not Found // State Street Diner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #4a9cd6;
            color: #1a1512;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            background-color: #faf6e8;
            border: 4px solid #1a1512;
            box-shadow: 10px 10px 0px #1a1512;
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            max-width: 28rem;
            text-align: center;
        }
        h1 {
            font-family: 'Courier Prime', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #c9242a;
            margin: 0 0 1rem;
        }
        p {
            font-family: 'Courier Prime', monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            margin: 0 0 1.5rem;
            color: #3f3f46;
        }
        a {
            display: inline-block;
            padding: 0.75rem 1.25rem;
            background-color: #fff3a1;
            border: 4px solid #1a1512;
            box-shadow: 3px 3px 0px #1a1512;
            border-radius: 0.75rem;
            color: #1a1512;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-decoration: none;
            transition: transform 0.15s;
        }
        a:hover {
            background-color: #fde047;
        }
        a:active {
            transform: translateY(2px);
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>404 Table Not Found</h1>
        <p>That booth doesn't exist at State Street Diner. Maybe the order code was wrong?</p>
        <a href="https://korpeztv.github.io/rawquarterpounder/">Back to the Menu</a>
    </div>
</body>
</html>
